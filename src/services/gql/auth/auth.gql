fragment AuthUserFields on User {
  id
  email
  name
  role
  avatar {
    id
    url
    thumbnailURL
  }
  settings {
    docs {
      id
      currency
      timezone
      locale
      theme
      geminiApiKey
      hfApiKey
      preferredModel
      allowFallback
      categoryAiMethod
      defaultAccount {
        id
        name
        icon
      }
    }
    hasNextPage
  }
  createdAt
  updatedAt
}

fragment AppSettingsAiFields on AppSetting {
  ai {
    enabled
    allowUserApiKey
    defaultModel
    models {
      id
      name
      provider
      enabled
      contextWindow
    }
  }
}

# Combined session query — fetches authenticated user + app-level settings in one trip.
query GetSession {
  meUser {
    user {
      ...AuthUserFields
    }
    exp
    collection
  }
  AppSetting {
    ...AppSettingsAiFields
  }
}

# Lightweight token check — used by AuthContext rehydration and token-manager.
query MeUser {
  meUser {
    user {
      ...AuthUserFields
    }
    exp
    collection
  }
}

mutation LoginUser($email: String!, $password: String!) {
  loginUser(email: $email, password: $password) {
    token
    exp
    user {
      ...AuthUserFields
    }
  }
}

mutation LogoutUser {
  logoutUser
}

# Payload's refreshTokenUser.user is a pared-down `usersJWT`, not the full User,
# so we only pull the token + expiry here. Callers should re-query `meUser` if
# they need refreshed user state.
mutation RefreshTokenUser {
  refreshTokenUser {
    refreshedToken
    exp
  }
}
