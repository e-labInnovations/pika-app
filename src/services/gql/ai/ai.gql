mutation TextToTransaction($text: String!, $model: String) {
  textToTransaction(text: $text, model: $model) {
    data
    model
    latencyMs
    promptId
    usage {
      promptTokenCount
      candidatesTokenCount
      totalTokenCount
    }
  }
}

mutation ImageToTransaction($image: String!, $mimeType: String, $model: String) {
  imageToTransaction(image: $image, mimeType: $mimeType, model: $model) {
    data
    model
    latencyMs
    promptId
    usage {
      promptTokenCount
      candidatesTokenCount
      totalTokenCount
    }
  }
}

mutation SuggestCategory(
  $type: String!
  $title: String!
  $amount: String
  $date: String
  $note: String
  $personId: String
  $model: String
  $forceMethod: String
) {
  suggestCategory(
    type: $type
    title: $title
    amount: $amount
    date: $date
    note: $note
    personId: $personId
    model: $model
    forceMethod: $forceMethod
  ) {
    category
    reason
    model
    latencyMs
    usage {
      promptTokenCount
      candidatesTokenCount
      totalTokenCount
    }
  }
}

mutation PredictCategory($type: String!, $title: String!) {
  predictCategory(type: $type, title: $title) {
    category
    score
    model
    latencyMs
  }
}
